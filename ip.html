<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP Information - AYAN TRICKS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo"><b>AT</b><br>AYAN TRICKS</div>
    <ul>
      <li onclick="window.location.href='index.html'"><i class="fa fa-home"></i> HOME</li>
      <li class="active"><i class="fa fa-globe"></i> IP INFORMATION</li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h1><span class="orange">IP</span> INFORMATION</h1>
      <p>CHECK YOUR IP DETAILS</p>
    </div>
    
    <div style="background:#1a1a1a;padding:20px;border-radius:10px;text-align:center">
      <h3>Your IP: <span id="ip">Loading...</span></h3>
      <p>Country: <span id="country">Loading...</span></p>
      <p>City: <span id="city">Loading...</span></p>
    </div>
  </div>

<script>
fetch('https://ipapi.co/json/')
.then(res=>res.json())
.then(data=>{
  document.getElementById('ip').innerText = data.ip;
  document.getElementById('country').innerText = data.country_name;
  document.getElementById('city').innerText = data.city;
})
</script>
</body>
</html>
