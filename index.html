<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AYAN TRICKS - All In One Toolkit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="sidebar">
    <div class="logo"><i class="fa-solid fa-crown"></i> AT <br><span>AYAN TRICKS</span></div>
    <ul>
      <li class="active"><i class="fa fa-home"></i> HOME</li>
      <li><i class="fa fa-info"></i> INFORMATION</li>
      <li><i class="fa fa-wrench"></i> TOOLS</li>
      <li><i class="fa fa-shield"></i> UTILITY TOOLS</li>
      <li><i class="fa fa-users"></i> SOCIAL TOOLS</li>
    </ul>
  </div>

  <div class="main">
    <div class="header">
      <h1>AYAN <span>TRICKS</span></h1>
      <p>ALL IN ONE TOOLKIT</p>
    </div>

    <div class="toolkit">
      <div class="card"><i class="fa fa-globe"></i><p>IP INFORMATION</p></div>
      <div class="card"><i class="fa fa-phone"></i><p>PHONE INFORMATION</p></div>
      <div class="card"><i class="fa fa-search"></i><p>WHOIS LOOKUP</p></div>
      <div class="card"><i class="fa fa-server"></i><p>DNS LOOKUP</p></div>
      <div class="card"><i class="fa fa-lock"></i><p>MD5 GENERATOR</p></div>
      <div class="card"><i class="fa fa-code"></i><p>ENCODE DECODE</p></div>
      <div class="card"><i class="fa fa-tools" style="color:#ff4500;"></i><p>TOOLKIT</p></div>
</div>
      <!-- aur cards yahan add karo -->
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
